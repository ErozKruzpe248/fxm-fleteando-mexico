<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Página no encontrada | FXM</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        min-height: 100vh;
        background-color: #1a1a1a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
        color: #fff;
      }

      .error-logo {
        height: 72px;
        width: auto;
        margin-bottom: 3rem;
      }

      .error-code {
        font-size: clamp(6rem, 20vw, 10rem);
        font-weight: 800;
        line-height: 1;
        color: #F04D23;
        letter-spacing: -0.04em;
        margin-bottom: 0.5rem;
      }

      .error-title {
        font-size: clamp(1.3rem, 4vw, 2rem);
        font-weight: 700;
        color: #fff;
        margin-bottom: 1rem;
      }

      .error-text {
        font-size: 1rem;
        color: #888;
        margin-bottom: 2.5rem;
        max-width: 360px;
        line-height: 1.7;
      }

      .error-btn {
        display: inline-block;
        padding: 0.85rem 2.5rem;
        background-color: #F04D23;
        color: #fff;
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        border-radius: 6px;
        text-decoration: none;
        transition: background-color 0.2s ease;
      }

      .error-btn:hover {
        background-color: #c93d1a;
      }

      .error-accent {
        width: 48px;
        height: 4px;
        background-color: #FFD600;
        margin: 1.5rem auto;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <img src="assets/logo-transparente.png" alt="Fleteando México" class="error-logo" />
    <p class="error-code">404</p>
    <div class="error-accent"></div>
    <h1 class="error-title">Página no encontrada</h1>
    <p class="error-text">La página que buscas no existe o fue movida.</p>
    <a href="index.html" class="error-btn">Volver al inicio</a>
  </body>
</html>
